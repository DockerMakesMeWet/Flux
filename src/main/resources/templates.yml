# =============================================================
# Flux Punishment Templates (Default)
# =============================================================
# Policy mapping:
#   This default catalog is organized by template key (for commands) and label
#   (human-readable display) with explicit tier durations under each template.
#
# Duration format (tier.duration possible values):
#   - timed values: number + unit (examples: 30m, 1h, 3d, 14d, 60d)
#     units: m (minutes), h (hours), d (days)
#   - permanent value: permanent
#
# Escalation behavior:
#   - Tier 1 = first use of that template for a player
#   - Tier 2 = second use, Tier 3 = third use, etc.
#   - If later policy tiers are N/A, leave them out.
#   - Flux always reuses the last configured real tier after max tier is reached.
#
# Template field possible values:
#   template key: lowercase slug (a-z, 0-9, hyphen), example: spam-chat
#   label: display name string, example: "Spam Chat"
#   category: group name string, example: "Chat & Communication"
#   permission: permission node string, example: "flux.template.spam-chat"
#   type:
#   - WARN
#   - MUTE
#   - BAN
#   notes: optional free-text guidance string (can be empty/omitted)
#   tiers: ordered list of at least one tier item
#   tier.reason: non-empty explanation shown to users/staff

templates:
  # Schema reminder (applies to every template below):
  #   <template-key>:
  #     label: "<display name>"
  #     category: "<group>"
  #     permission: "flux.template.<template-key>"
  #     type: "WARN|MUTE|BAN"
  #     notes: "<optional guidance>"
  #     tiers:
  #       - duration: "<30m|1h|3d|14d|30d|permanent>"
  #         reason: "<shown in punishment reason>"
  #
  # Tier lists below are intentionally explicit so policy durations are easy to audit.
  #
  # Quick policy index (template key => tier durations):
  #   general => permanent
  #   chat-conduct => permanent
  #   spawn-camping => permanent
  #   language => permanent
  #
  #   spam-chat => 1h -> 6h -> 1d -> 7d
  #   spam-command => 1h -> 6h -> 1d -> 7d
  #   toxicity-light => 1h -> 6h -> 1d -> 7d
  #   toxicity-severe => 1d -> 3d -> 7d -> 30d
  #   hate-speech => 3d -> 7d -> 30d -> permanent
  #   nsfw-chat => 3h -> 1d -> 7d (later policy tiers N/A)
  #   advertising-light => 1d -> 7d -> permanent (later policy tiers N/A)
  #   advertising-malicious => 30d -> permanent (later policy tiers N/A)
  #   report-abuse => 1h -> 1d -> 3d (later policy tiers N/A)
  #   begging => 30m -> 3h -> 1d (later policy tiers N/A)
  #   political-dispute => 1h -> 1d -> 3d (later policy tiers N/A)
  #
  #   cheat-combat => 7d -> 30d -> permanent
  #   cheat-movement => 7d -> 30d -> permanent
  #   cheat-render => 3d -> 14d -> 60d
  #   cheat-autoclicker => 3d -> 7d -> 30d
  #   cheat-misc => 1d -> 3d -> 14d
  #
  #   exploit-server => 3d -> 14d -> permanent
  #   grief-server => 30d -> permanent
  #   inappropriate-builds => 1d -> 7d -> 30d
  #   inappropriate-skin => 1d -> 7d -> permanent
  #   refusing-ss => 30d -> permanent
  #   alt-farming => 14d -> permanent
  #
  #   duping-economy => permanent
  #   server-harm => permanent
  #   safety-threat => permanent
  #   botting => permanent
  #   punishment-evasion => permanent

  # -----------------------------------------------------------
  # Warnings (Helper+)
  # -----------------------------------------------------------
  general:
    label: "General"
    category: "Warnings"
    permission: "flux.template.general"
    type: "WARN"
    notes: "General, generic rule breaking."
    tiers:
      - duration: "permanent"
        reason: "General, generic rule breaking"

  chat-conduct:
