templates:
  general:
    label: "General"
    category: "Warnings"
    permission: "flux.template.general"
    type: "WARN"
    notes: "Generic rule break."
    tiers:
      - duration: "permanent"
        reason: "You have been warned for a general rule violation. Please review our server rules to ensure you are playing fairly."

  chat-conduct:
    label: "Chat Conduct"
    category: "Warnings"
    permission: "flux.template.chat-conduct"
    type: "WARN"
    notes: "First instance of rudeness/arguing."
    tiers:
      - duration: "permanent"
        reason: "Please be respectful in chat! We want to keep the server friendly and welcoming for everyone. Avoid arguing or being rude."

  spawn-camping:
    label: "Spawn Camping"
    category: "Warnings"
    permission: "flux.template.spawn-camping"
    type: "WARN"
    notes: "Repeatedly killing new players at spawn/warps."
    tiers:
      - duration: "permanent"
        reason: "Spawn camping is not allowed. Please allow a fair chance for players who have just respawned or joined the server."

  language:
    label: "Language"
    category: "Warnings"
    permission: "flux.template.language"
    type: "WARN"
    notes: "Reminding players to speak English/clean chat."
    tiers:
      - duration: "permanent"
        reason: "Please keep your chat messages clean and appropriate, and converse primarily in English so our staff can moderate effectively."

  spam-chat:
