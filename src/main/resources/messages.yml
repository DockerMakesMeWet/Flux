# =============================================================
# Flux Messages Configuration
# =============================================================
# Formatting engine: MiniMessage
#
# For every message key in this file:
#   - Possible values: any valid MiniMessage string
#   - You can use colors/tags like: <red> <yellow> <bold> <gray> <newline> <gradient:#hex:#hex>
#
# Placeholder reference by key:
#   <server> <discord> <id> <type> <target> <executor> <reason> <voided> <void_reason> <void_note> <ip> <seen>
#   <version> <player> <username> <target_id> <count> <label> <verb> <id_warning>
#   <expires_at> <time_left>
#   <time_left> <expires_at> <template_step> <command_type> <template_type>
# If a placeholder is not used by a key, it is ignored.

# Prefix added before most command/staff feedback messages.
# Possible values: any MiniMessage string
prefix: "<gradient:#00FBFF:#9D00FF><bold><server></bold></gradient> <gray>»</gray> "

# Prefix added before player-facing chat notices.
# Possible values: any MiniMessage string
user-prefix: "<gradient:#f7d74b:#ffd86b><bold><server></bold></gradient> <gray>»</gray> "

branding:
  # Display name for this server/network branding.
  # Placeholders: <server>
  server-name: "Flux"

  # Public support/appeal Discord invite.
  # Placeholders: <discord>
  discord: "dsc.gg/mcducky"

user-branding:
  # Display name for user-facing messages/screens.
  # Placeholders: <server>
  server-name: "DuckyMC"

  # Public support/appeal Discord invite shown to users.
  # Placeholders: <discord>
  discord: "dsc.gg/mcducky"

errors:
  # Shown when a user lacks permission.
  # Placeholders: none
  no-permission: "<red>You don't have permission to use that command.</red>"

  # Shown when player lookup fails.
  # Placeholders: <player>
  player-not-found: "<red>Couldn't find player <white><player></white>.</red>"

  # Shown when target is protected from moderation actions.
  # Placeholders: none
  target-protected: "<red>You can't take moderation action on that player.</red>"

staff:
  # Silent/staff broadcast for new actions.
  # Placeholders: <id> <executor> <target> <type> <reason>
  action-broadcast: "<gold><bold>STAFF</bold></gold> <gray>•</gray> <white><executor></white> <gray>issued</gray> <yellow><type></yellow> <gray>to</gray> <white><target></white> <dark_gray>[<id>]</dark_gray>"

  # Hover details for action broadcast.
  # Placeholders: <id> <executor> <target> <type> <reason>
  action-broadcast-hover: "<yellow><bold>Moderation Action</bold></yellow><newline><gray>ID:</gray> <white><id></white><newline><gray>Type:</gray> <white><type></white><newline><gray>Target:</gray> <white><target></white><newline><gray>Executor:</gray> <white><executor></white><newline><gray>Reason:</gray> <white><reason></white><newline><gold>Click to suggest /check <id></gold>"

  # Console broadcast line for new actions.
  # Placeholders: <id> <executor> <target> <type> <reason>
  action-broadcast-console: "[Flux Moderation] <type> <target> by <executor> [<id>] reason=<reason>"

  # Silent/staff broadcast for voided actions.
  # Placeholders: <id> <executor> <target_id> <reason>
  void-broadcast: "<gold><bold>STAFF</bold></gold> <gray>•</gray> <white><executor></white> <gray>voided</gray> <yellow><target_id></yellow> <dark_gray>[<id>]</dark_gray>"

  # Hover details for voided-action broadcast.
  # Placeholders: <id> <executor> <target_id> <reason>
  void-broadcast-hover: "<yellow><bold>Void Action</bold></yellow><newline><gray>Void ID:</gray> <white><id></white><newline><gray>Target ID:</gray> <white><target_id></white><newline><gray>Executor:</gray> <white><executor></white><newline><gray>Reason:</gray> <white><reason></white><newline><gold>Click to suggest /check <target_id></gold>"

  # Console broadcast line for voided actions.
  # Placeholders: <id> <executor> <target_id> <reason>
  void-broadcast-console: "[Flux Moderation] VOID <target_id> by <executor> [<id>] reason=<reason>"

commands:
  # Wrapper used when showing command usage text.
  # Placeholders: <usage>
  usage-format: "<red>Usage: <white><usage></white></red>"

  # Per-command usage strings.
  # Placeholders: none
  usage-ban: "/ban <user> [duration] <reason/#template>"
  usage-mute: "/mute <user> [duration] <reason/#template>"
  usage-warn: "/warn <user> <reason/#template>"
  usage-kick: "/kick <user> <reason/#template>"
  usage-ipban: "/ipban <user/ip> [duration] <reason/#template>"
  usage-ipmute: "/ipmute <user/ip> [duration] <reason/#template>"
  usage-unban: "/unban <user/ip/id> <reason>"
  usage-unmute: "/unmute <user/ip/id> <reason>"
  usage-void: "/void <id> <reason>"
  usage-voidall: "/voidall <user/ip> <reason>"
  usage-history: "/history <user/ip> [page]"
  usage-alts: "/alts <user> [page]"
  usage-iphistory: "/iphistory <ip/user> [page]"
  usage-check: "/check <id>"
  usage-checkplayer: "/checkplayer <user> [page]"
  usage-checkip: "/checkip <ip/user> [page]"
  usage-checkwarns: "/checkwarns <user/ip> [page]"
  usage-flux: "/flux [reload|ver|info|version]"

  # Generic command parsing errors.
  # Placeholders: <page> <command_type> <template_type>
  invalid-duration: "<red>Invalid duration format.</red>"
  template-not-found: "<red>Template not found.</red>"
  template-type-mismatch: "<red>This command only accepts <command_type> templates. You used a <template_type> template.</red>"
  invalid-page: "<red>Invalid page <white><page></white>. Use a positive number.</red>"

  # Confirmation for creating an action.
  # Placeholders: <type> <target> <id>
  action-created: "<yellow>Action logged: <white><type></white> on <white><target></white> <gray>(ID: <id>)</gray></yellow>"

  # Extra verbose summary shown after successful punishments.
  # Placeholders: <id>
  punishment-summary-header: "<gray>===</gray> <yellow>Punishment summary for <white><id></white></yellow> <gray>===</gray>"
  punishment-summary-footer: "<gray>===</gray> <yellow>End punishment summary for <white><id></white></yellow> <gray>===</gray>"

  # Confirmation for updating punishment state.
  # Placeholders: <target>
  action-updated: "<yellow>Updated punishment state for <white><target></white>.</yellow>"

  # Confirmation for voiding an action.
  # Placeholders: <id>
  void-updated: "<yellow>Voided punishment/action <white><id></white>.</yellow>"

  # Confirmation for bulk voiding active punishments.
  # Placeholders: <target> <count>
  voidall-updated: "<yellow>Voided <white><count></white> active punishment(s) for <white><target></white>.</yellow>"

  # Shown when a punishment/action cannot be found.
  # Placeholders: none
  action-not-found: "<red>No matching punishment was found.</red>"

  # Header for /check output.
  # Placeholders: <id>
  check-header: "<gray>===</gray> <yellow>Checking action <white><id></white></yellow> <gray>===</gray>"

  # Footer for /check output.
  # Placeholders: <id>
  check-footer: "<gray>===</gray> <yellow>End check for <white><id></white></yellow> <gray>===</gray>"

  # Detailed /check lines.
  # Placeholders: <type> <target> <ip> <issuer> <reason> <started> <duration> <expires> <active> <voided> <void_reason> <ip_punishment> <template> <template_step>
  check-detail-type: "<gray>Type:</gray> <white><type></white>"
  check-detail-target: "<gray>Target:</gray> <white><target></white> <dark_gray>(ip=<ip>)</dark_gray>"
  check-detail-issuer: "<gray>Issuer:</gray> <white><issuer></white>"
  check-detail-reason: "<gray>Reason:</gray> <white><reason></white>"
  check-detail-started: "<gray>Started:</gray> <white><started></white>"
  check-detail-duration: "<gray>Duration:</gray> <white><duration></white>"
  check-detail-expires: "<gray>Expires:</gray> <white><expires></white>"
  check-detail-status: "<gray>Active:</gray> <white><active></white> <gray>| Voided:</gray> <white><voided></white> <gray>| Void Reason:</gray> <white><void_reason></white>"
  check-detail-meta: "<gray>IP Punishment:</gray> <white><ip_punishment></white> <gray>| Template:</gray> <white><template></white> <gray>| Template Step:</gray> <white><template_step></white>"

  # Summary list entries used by /checkplayer and /checkip.
  # Placeholders: <id> <type> <reason> <target>
  check-summary-entry: "<gray>-</gray> <white><id></white> <yellow><type></yellow> <gray><reason></gray>"
  check-summary-entry-with-target: "<gray>-</gray> <white><id></white> <yellow><type></yellow> <gray><reason></gray> <dark_gray>(target=<target>)</dark_gray>"

  # Header for /checkplayer output.
  # Placeholders: <target>
  checkplayer-header: "<gray>===</gray> <yellow>Checking active punishments for <white><target></white></yellow> <gray>===</gray>"

  # Footer for /checkplayer output.
  # Placeholders: <target> <count>
  checkplayer-footer: "<gray>===</gray> <yellow>Found <white><count></white> active entries for <white><target></white></yellow> <gray>===</gray>"

  # Header for /checkip output.
  # Placeholders: <target>
  checkip-header: "<gray>===</gray> <yellow>Checking active punishments for IP <white><target></white></yellow> <gray>===</gray>"

  # Header for /checkwarns output.
  # Placeholders: <target>
  checkwarns-header: "<gray>===</gray> <yellow>Checking warnings for <white><target></white></yellow> <gray>===</gray>"

  # Footer for /checkip output.
  # Placeholders: <target> <count>
  checkip-footer: "<gray>===</gray> <yellow>Found <white><count></white> active entries for IP <white><target></white></yellow> <gray>===</gray>"

  # Header for history output.
  # Placeholders: <target>
  history-header: "<gray>===</gray> <yellow>History of <white><target></white></yellow> <gray>===</gray>"

  # Footer for history output.
  # Placeholders: <target> <count>
  history-footer: "<gray>===</gray> <yellow>End history of <white><target></white> (<count>)</yellow> <gray>===</gray>"

  # Entry line for history output.
  # Placeholders: <id> <type> <reason>
  history-entry: "<gray>•</gray> <white><id></white> <yellow><type></yellow> <gray>-</gray> <white><reason></white>"

  # Hover details for history entries.
  # Placeholders: <id> <type> <reason>
  history-entry-hover: "<yellow><bold>History Entry</bold></yellow><newline><gray>ID:</gray> <white><id></white><newline><gray>Type:</gray> <white><type></white><newline><gray>Reason:</gray> <white><reason></white><newline><gold>Click to suggest /check <id></gold>"

  # Header for alternate-account output.
  # Placeholders: <ip>
  alts-header: "<yellow>Accounts sharing IP <white><ip></white>:</yellow>"

  # Entry line for alternate-account output.
  # Placeholders: <username>
  alts-entry: "<gray>•</gray> <white><username></white>"
  alts-entry-banned: "<gray>•</gray> <red><username></red> <dark_gray>(banned)</dark_gray>"
  alts-entry-muted: "<gray>•</gray> <yellow><username></yellow> <dark_gray>(muted)</dark_gray>"
  alts-legend: "<gray>Key: <red>Red</red> = banned  <yellow>Yellow</yellow> = muted  <white>White</white> = clean</gray>"

  # Entry line for account listing when querying /iphistory by IP literal.
  # Placeholders: <account> <seen>
  iphistory-account-entry: "<gray>-</gray> <white><account></white> <dark_gray>(<seen>)</dark_gray>"

  # Header for IP history output.
  # Placeholders: <target>
  iphistory-header: "<gray>===</gray> <yellow>IP history for <white><target></white></yellow> <gray>===</gray>"

  # Footer for IP history output.
  # Placeholders: <target> <count>
  iphistory-footer: "<gray>===</gray> <yellow>End IP history of <white><target></white> (<count>)</yellow> <gray>===</gray>"

  # Entry line for IP history output.
  # Placeholders: <ip> <seen>
  iphistory-entry: "<gray>•</gray> <white><ip></white> <dark_gray>(<seen>)</dark_gray>"

  # Pagination controls and status line.
  # Placeholders: <page> <pages>
  pagination-prev: "<yellow><bold><<</bold></yellow>"
  pagination-prev-disabled: "<dark_gray><bold><<</bold></dark_gray>"
  pagination-viewing: "<yellow>Viewing page <white><page></white> out of <white><pages></white></yellow>"
  pagination-next: "<yellow><bold>>></bold></yellow>"
  pagination-next-disabled: "<dark_gray><bold>>></bold></dark_gray>"

  # Reload success message when masters refresh also succeeds.
  # Placeholders: none
  reload-success: "<yellow><server></yellow><gray> configs reloaded and masters refreshed.</gray>"

  # Reload message when config reload succeeds but masters refresh fails.
  # Placeholders: none
  reload-partial: "<yellow><server></yellow><gray> configs reloaded, but masters refresh failed; previous cache retained.</gray>"

  # Version display line.
  # Placeholders: <version>
  version: "<yellow><server></yellow> <gray>v<white><version></white></gray>"

player:
  # Sent to non-staff players when they receive a punishment while online.
  # Placeholders: <id> <executor> <type> <reason> <expires_at> <time_left> <id_warning>
  punished-notice: "<yellow>You were <white><type></white> by <white><executor></white>.</yellow><newline><gray>Reason:</gray> <white><reason></white><newline><gray>Expires At:</gray> <white><expires_at></white><newline><gray>Time Left:</gray> <white><time_left></white><newline><gray>ID:</gray> <white><id></white><newline><id_warning>"

  # Sent when an active mute is removed while the player is online.
  # Placeholders: none
  unmuted-notice: "<yellow>Your mute has been lifted. You're free to chat again.</yellow>"

  # Sent when a warning is removed while the player is online.
  # Placeholders: <id> <id_warning>
  warn-removed-notice: "<yellow>A warning was removed from your record.</yellow> <gray>(ID: <white><id></white>)</gray><newline><id_warning>"

  # Warning shown anywhere a player-facing punishment ID is displayed.
  # Placeholders: none
  id-share-warning: "<red>Warning:</red> <yellow>Sharing this ID may hurt your appeal chances.</yellow>"

  # Header shown to players who received punishments while offline.
  # Placeholders: <count> <label> <verb> <server>
  offline-join-header: "<yellow>Welcome back to <white><server></white>! While you were away, <white><count></white> <white><label></white> <white><verb></white> applied to your account.</yellow>"

  # Entry line for each pending offline punishment.
  # Placeholders: <type> <id> <reason> <id_warning>
  offline-join-entry: "<gray>•</gray> <yellow><type></yellow> <gray>(ID: <white><id></white>)</gray> <gray>-</gray> <white><reason></white><newline><id_warning>"

screens:
  # Full-screen disconnect message for bans.
  # Placeholders: <id> <reason> <expires_at> <time_left> <server> <discord> <id_warning>
  ban-screen: "<gradient:#f7d74b:#ffd86b><bold><server></bold></gradient><newline><red>You are currently banned from this network.</red><newline><gray>Reason:</gray> <white><reason></white><newline><gray>Expires At:</gray> <white><expires_at></white><newline><gray>Time Left:</gray> <white><time_left></white><newline><gray>ID:</gray> <white><id></white><newline><id_warning><newline><gray>Appeal:</gray> <yellow><discord></yellow>"

  # Full-screen disconnect message for kicks.
  # Placeholders: <id> <reason> <server> <discord> <id_warning>
  kick-screen: "<gradient:#f7d74b:#ffd86b><bold><server></bold></gradient><newline><yellow>You were removed from this network.</yellow><newline><gray>Reason:</gray> <white><reason></white><newline><gray>ID:</gray> <white><id></white><newline><id_warning><newline><gray>Need help?</gray> <yellow><discord></yellow>"

  # Chat feedback when muted players try to speak.
  # Placeholders: <discord> <id> <time_left> <expires_at>
  muted-message: "<yellow>You are currently muted and cannot chat right now.</yellow><newline><gray>Punishment ID:</gray> <white><id></white><newline><gray>Time left:</gray> <white><time_left></white><newline><gray>Expires at:</gray> <white><expires_at></white><newline><gray>If this seems wrong, visit <white><discord></white>.</gray>"
